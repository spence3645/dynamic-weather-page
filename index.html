<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Philadelphia Weather</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .city {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 2rem;
    }

    .dots {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #2a2a2a;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 60%, 100% { background: #2a2a2a; transform: scale(1); }
      30% { background: #555; transform: scale(1.3); }
    }

    .status {
      font-size: 0.75rem;
      color: #383838;
      letter-spacing: 0.05em;
    }

    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    #error p {
      color: #555;
      font-size: 0.8rem;
    }

    #error a {
      color: #666;
      text-decoration: underline;
      font-size: 0.75rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="city">Philadelphia, PA</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status" id="status">Fetching weather</div>
  </div>

  <div id="error">
    <p id="error-msg">Something went wrong.</p>
    <a href="javascript:location.reload()">Try again</a>
  </div>

  <script>
  (function () {
    'use strict';

    const CACHE_KEY = 'philly-weather';

    function todayNY() {
      return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveCache(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayNY(), data }));
      } catch {}
    }

    const WMO = {
      0:  { label: 'Clear sky',                   emoji: '☀️' },
      1:  { label: 'Mainly clear',                emoji: '🌤️' },
      2:  { label: 'Partly cloudy',               emoji: '⛅' },
      3:  { label: 'Overcast',                    emoji: '☁️' },
      45: { label: 'Foggy',                       emoji: '🌫️' },
      48: { label: 'Icy fog',                     emoji: '🌫️' },
      51: { label: 'Light drizzle',               emoji: '🌦️' },
      53: { label: 'Moderate drizzle',            emoji: '🌦️' },
      55: { label: 'Dense drizzle',               emoji: '🌧️' },
      56: { label: 'Light freezing drizzle',      emoji: '🌨️' },
      57: { label: 'Heavy freezing drizzle',      emoji: '🌨️' },
      61: { label: 'Slight rain',                 emoji: '🌧️' },
      63: { label: 'Moderate rain',               emoji: '🌧️' },
      65: { label: 'Heavy rain',                  emoji: '🌧️' },
      66: { label: 'Light freezing rain',         emoji: '🌨️' },
      67: { label: 'Heavy freezing rain',         emoji: '🌨️' },
      71: { label: 'Slight snowfall',             emoji: '❄️' },
      73: { label: 'Moderate snowfall',           emoji: '🌨️' },
      75: { label: 'Heavy snowfall',              emoji: '❄️' },
      77: { label: 'Snow grains',                 emoji: '🌨️' },
      80: { label: 'Slight showers',              emoji: '🌦️' },
      81: { label: 'Moderate showers',            emoji: '🌧️' },
      82: { label: 'Violent showers',             emoji: '⛈️' },
      85: { label: 'Slight snow showers',         emoji: '🌨️' },
      86: { label: 'Heavy snow showers',          emoji: '❄️' },
      95: { label: 'Thunderstorm',                emoji: '⛈️' },
      96: { label: 'Thunderstorm w/ hail',        emoji: '⛈️' },
      99: { label: 'Thunderstorm w/ heavy hail',  emoji: '⛈️' }
    };

    function getCondition(code, isDay) {
      const w = WMO[code] || { label: 'Unknown', emoji: '🌡️' };
      const emoji = (!isDay && code <= 1) ? '🌙' : w.emoji;
      return emoji + ' ' + w.label;
    }

    function getWeatherEffect(code, isDay) {
      if (code <= 1) return isDay ? 'sun' : 'stars';
      if (code <= 3) return 'clouds';
      if (code <= 48) return 'fog';
      if (code <= 67) return 'rain';
      if (code <= 77) return 'snow';
      if (code <= 82) return 'rain';
      if (code <= 86) return 'snow';
      return 'storm';
    }

    function showError(msg) {
      document.getElementById('loader').style.display = 'none';
      const errEl = document.getElementById('error');
      errEl.style.display = 'flex';
      document.getElementById('error-msg').textContent = msg;
    }

    async function init() {
      const statusEl = document.getElementById('status');
      const today = todayNY();
      const cached = loadCache();

      let weatherData;
      try {
        if (cached && cached.date === today) {
          weatherData = cached.data;
        } else {
          const res = await fetch(
            'https://api.open-meteo.com/v1/forecast?' +
            'latitude=39.9524&longitude=-75.1636' +
            '&current=temperature_2m,is_day,weather_code' +
            '&temperature_unit=fahrenheit' +
            '&timezone=America%2FNew_York' +
            '&forecast_days=1'
          );
          if (!res.ok) throw new Error('Weather API ' + res.status);
          weatherData = await res.json();
          saveCache(weatherData);
        }
      } catch (err) {
        if (cached) {
          weatherData = cached.data;
        } else {
          showError('Could not load weather data. Check your connection and try again.');
          return;
        }
      }

      const c = weatherData.current;
      const payload = {
        location: 'Philadelphia, PA',
        datetime: new Date().toLocaleString('en-US', {
          timeZone: 'America/New_York',
          weekday: 'long',
          month: 'long',
          day: 'numeric',
          year: 'numeric',
          hour: 'numeric',
          minute: '2-digit',
          hour12: true
        }),
        temperature: Math.round(c.temperature_2m) + '°F',
        condition: getCondition(c.weather_code, c.is_day),
        weatherEffect: getWeatherEffect(c.weather_code, c.is_day),
        isDay: c.is_day === 1
      };

      statusEl.textContent = 'Designing your page';

      let html;
      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('Generate API ' + res.status);
        html = await res.text();
      } catch (err) {
        showError('Could not generate page. Please try again.');
        return;
      }

      const newDoc = new DOMParser().parseFromString(html, 'text/html');
      Array.from(newDoc.documentElement.attributes).forEach(({ name, value }) => {
        document.documentElement.setAttribute(name, value);
      });
      document.documentElement.innerHTML = newDoc.documentElement.innerHTML;
    }

    init();
  })();
  </script>
</body>
</html>
